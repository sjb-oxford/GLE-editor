name: Release Windows app

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark as prerelease?"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows EXE
        run: |
          pyinstaller --noconfirm --windowed --name GLE-Editor --icon icon.ico gle-editor.py

      - name: Zip EXE
        run: |
          powershell Compress-Archive -Path "dist\GLE-Editor" -DestinationPath "GLE-Editor-Windows.zip"

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Create installer script
        run: |
          @"
          [Setup]
          AppName=GLE Editor
          AppVersion=1.0
          DefaultDirName={pf}\GLE Editor
          DefaultGroupName=GLE Editor
          OutputDir=.
          OutputBaseFilename=GLE-Editor-Installer
          Compression=lzma
          SolidCompression=yes 

          [Files]
          Source: "dist\GLE-Editor\*"; DestDir: "{app}"; Flags: recursesubdirs

          [Icons]
          Name: "{group}\GLE Editor"; Filename: "{app}\GLE-Editor.exe"
          "@ | Out-File -Encoding ASCII installer.iss

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"

      - name: Compute next version tag
        id: version
        shell: bash
        run: |
          tags=$(git tag -l "v*")
          if [ -z "$tags" ]; then
            echo "tag=v1.0.0" >> $GITHUB_OUTPUT
          else
            latest=$(echo "$tags" | sort -V | tail -n 1)
            version=${latest#v}
            IFS='.' read -r major minor patch <<< "$version"
            patch=$((patch + 1))
            echo "tag=v$major.$minor.$patch" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          if (-not $tag) { $tag = "v1.0.0" }  

          if ("${{ inputs.prerelease }}" -eq "true") {
            gh release create $tag `
              "GLE-Editor-Windows.zip" `
              "GLE-Editor-Installer.exe" `
              --title "GLE Editor $tag" `
              --notes "Windows build" `
              --prerelease
          }
         else {
           gh release create $tag `
             "GLE-Editor-Windows.zip" `
             "GLE-Editor-Installer.exe" `
             --title "GLE Editor $tag" `
             --notes "Windows build"
         }
