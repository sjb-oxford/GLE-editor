name: Release Windows app

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark as prerelease?"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows EXE
        run: |
          pyinstaller --noconfirm --windowed --name GLE-Editor --icon icon.ico gle-editor.py

      - name: Zip EXE
        run: |
          Compress-Archive -Path "dist\GLE-Editor" -DestinationPath "GLE-Editor-Windows.zip"

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Create installer script
        shell: pwsh
        run: |
          Set-Content installer.iss "[Setup]"
          Add-Content installer.iss "AppName=GLE Editor"
          Add-Content installer.iss "AppVersion=1.0"
          Add-Content installer.iss "DefaultDirName={pf}\GLE Editor"
          Add-Content installer.iss "DefaultGroupName=GLE Editor"
          Add-Content installer.iss "OutputDir=."
          Add-Content installer.iss "OutputBaseFilename=GLE-Editor-Installer"
          Add-Content installer.iss "Compression=lzma"
          Add-Content installer.iss "SolidCompression=yes"
          Add-Content installer.iss ""
          Add-Content installer.iss "[Files]"
          Add-Content installer.iss "Source: ""dist\GLE-Editor\*""; DestDir: ""{app}""; Flags: recursesubdirs"
          Add-Content installer.iss ""
          Add-Content installer.iss "[Icons]"
          Add-Content installer.iss "Name: ""{group}\GLE Editor""; Filename: ""{app}\GLE-Editor.exe"""

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"

      - name: Upload to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = (git describe --tags --abbrev=0).Trim()

          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "GLE Editor $tag" --notes "Windows build"
          }
	  
          gh release upload $tag `
            "GLE-Editor-Windows.zip" `
            "GLE-Editor-Installer.exe" `
            --clobber





