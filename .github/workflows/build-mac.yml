name: Build mac app

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build mac app
        run: |
          pyinstaller --noconfirm --windowed --name "GLE Editor" gle_launcher.py

      - name: Zip the app
        run: |
          ditto -c -k --keepParent "dist/GLE Editor.app" "GLE-Editor-macOS.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: GLE-Editor-macOS.zip
