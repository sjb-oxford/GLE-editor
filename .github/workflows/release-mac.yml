name: Release mac app

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark this release as a prerelease?"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build mac app
        run: |
          pyinstaller --noconfirm --windowed --name "GLE Editor" --icon icon.icns gle_launcher.py




      - name: Zip the app
        run: |
          ditto -c -k --keepParent "dist/GLE Editor.app" "GLE-Editor-macOS.zip"

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          tag=$(git describe --tags --abbrev=0)

          if [ "$PRERELEASE" = "true" ]; then
            gh release create "$tag" \
              "GLE-Editor-macOS.zip" \
              --title "GLE Editor $tag" \
              --notes "Automated release from commit ${{ github.sha }}" \
              --target "${{ github.sha }}" \
              --prerelease
          else
            gh release create "$tag" \
              "GLE-Editor-macOS.zip" \
              --title "GLE Editor $tag" \
              --notes "Automated release from commit ${{ github.sha }}" \
              --target "${{ github.sha }}"
          fi


